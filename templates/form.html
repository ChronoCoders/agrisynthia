<style>
    .upload-zone {
        border: 2px dashed #b0bec5;
        border-radius: 12px;
        padding: 28px 16px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.2s, background 0.2s;
        background: #fafafa;
        position: relative;
    }
    .upload-zone.dragover {
        border-color: #2E7D32;
        background: #E8F5E9;
    }
    .upload-zone input[type="file"] {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        width: 100%;
        height: 100%;
    }
    .upload-zone .upload-icon {
        font-size: 2.4rem;
        color: #b0bec5;
        margin-bottom: 10px;
        pointer-events: none;
    }
    .upload-zone .upload-label {
        font-size: 15px;
        color: #555;
        pointer-events: none;
    }
    .upload-zone .upload-sub {
        font-size: 12px;
        color: #aaa;
        margin-top: 4px;
        pointer-events: none;
    }
    #preview-container {
        display: none;
        margin-top: 12px;
        border-radius: 8px;
        overflow: hidden;
        border: 1px solid #e0e0e0;
    }
    #preview-container img {
        width: 100%;
        max-height: 260px;
        object-fit: contain;
        display: block;
        background: #f5f5f5;
    }
    #preview-filename {
        font-size: 12px;
        color: #777;
        padding: 6px 10px;
        background: #fafafa;
    }
    .form-control-touch {
        height: 48px;
        font-size: 15px;
        border-radius: 8px;
        padding: 10px 14px;
        touch-action: manipulation;
    }
    select.form-control-touch { appearance: none; }
    .btn-submit-mobile {
        width: 100%;
        height: 52px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 10px;
        touch-action: manipulation;
        background: #2E7D32;
        border-color: #2E7D32;
        color: #fff;
        margin-top: 8px;
    }
    .btn-submit-mobile:hover,
    .btn-submit-mobile:active {
        background: #1b5e20;
        border-color: #1b5e20;
        color: #fff;
    }
    .btn-submit-mobile:disabled {
        background: #81C784;
        border-color: #81C784;
    }
    .input-icon-group {
        position: relative;
    }
    .input-icon-group .input-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #9E9E9E;
        pointer-events: none;
    }
    .input-icon-group input,
    .input-icon-group select {
        padding-left: 38px;
    }
    #detection-status-box {
        display: none;
        margin-top: 16px;
        border-radius: 10px;
        padding: 14px 16px;
        background: #f1f8e9;
        border: 1px solid #c8e6c9;
    }
    #detection-status-box.error {
        background: #fce4ec;
        border-color: #f48fb1;
    }
    #detection-status-msg {
        font-size: 14px;
        color: #388E3C;
        margin-bottom: 8px;
        font-weight: 500;
    }
    #detection-status-box.error #detection-status-msg {
        color: #c62828;
    }
    #detection-progress-bar {
        height: 8px;
        border-radius: 4px;
        background: #a5d6a7;
        transition: width 0.4s ease;
        width: 0%;
    }
    #detection-progress-track {
        background: #e0e0e0;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 10px;
    }
    #detection-result-card {
        display: none;
        margin-top: 16px;
        border-radius: 10px;
        border: 1px solid #c8e6c9;
        background: #fff;
        overflow: hidden;
    }
    #detection-result-card .result-header {
        background: #2E7D32;
        color: #fff;
        padding: 10px 16px;
        font-weight: 600;
        font-size: 15px;
    }
    #detection-result-card .result-body {
        padding: 14px 16px;
    }
    #detection-result-card .result-row {
        display: flex;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px solid #f5f5f5;
        font-size: 14px;
        color: #333;
    }
    #detection-result-card .result-row:last-child { border-bottom: none; }
    #detection-result-card .result-row .label { color: #757575; }
    #detection-result-card .result-row .value { font-weight: 600; }
    #detection-result-img {
        width: 100%;
        border-top: 1px solid #e0e0e0;
        display: none;
    }
    #detection-result-img img {
        width: 100%;
        max-height: 300px;
        object-fit: contain;
        display: block;
        background: #f5f5f5;
    }
</style>

{% load i18n %}
<div class="col-lg-6 col-12">
    <div class="box-content card white">
        <h4 class="box-title">{% trans "Meyve Tespiti" %}</h4>
        <div class="card-content">
            <form id="upload-file" method="post" enctype="multipart/form-data" novalidate>
                {% csrf_token %}

                <div class="form-group input-icon-group" style="margin-bottom:14px;">
                    <i class="fa-solid fa-seedling input-icon"></i>
                    <select name="meyve_grubu" id="meyve_grubu" class="form-control form-control-touch" aria-label="{% trans 'Meyve Grubu' %}">
                        <option value="">{% trans "Meyve Grubu Seçin" %}</option>
                        <option value="mandalina">{% trans "Mandalina" %}</option>
                        <option value="elma">{% trans "Elma" %}</option>
                        <option value="armut">{% trans "Armut" %}</option>
                        <option value="seftale">{% trans "Şeftali" %}</option>
                        <option value="nar">{% trans "Nar" %}</option>
                        <option value="agac">{% trans "Ağaç" %}</option>
                    </select>
                </div>

                <div class="form-group input-icon-group" style="margin-bottom:14px;">
                    <i class="fa-solid fa-tree input-icon"></i>
                    <input type="number" name="agac_sayisi" id="agac_sayisi" class="form-control form-control-touch"
                           placeholder="{% trans 'Toplam Ağaç Sayısı' %}" min="1" max="10000"
                           aria-label="{% trans 'Ağaç Sayısı' %}" inputmode="numeric">
                </div>

                <div class="form-group input-icon-group" style="margin-bottom:14px;">
                    <i class="fa-brands fa-pagelines input-icon"></i>
                    <input type="number" name="agac_yasi" id="agac_yasi" class="form-control form-control-touch"
                           placeholder="{% trans 'Ağaç Yaşı' %}" min="1" max="100"
                           aria-label="{% trans 'Ağaç Yaşı' %}" inputmode="numeric">
                </div>

                <div class="form-group input-icon-group" style="margin-bottom:14px;">
                    <i class="fa-regular fa-chart-simple input-icon"></i>
                    <input type="text" name="ekim_sirasi" id="ekim_sirasi" class="form-control form-control-touch"
                           placeholder="{% trans 'Ekim Sırası (örn: 3-5)' %}"
                           pattern="[0-9]+-[0-9]+"
                           title="{% trans 'Ekim sırası formatı: 3-5' %}"
                           aria-label="{% trans 'Ekim Sırası' %}" inputmode="text">
                </div>

                <div class="form-group" style="margin-bottom:14px;">
                    <div class="upload-zone" id="uploadZone">
                        <input id="exampleInputFile"
                               type="file"
                               name="file"
                               accept="image/jpeg,image/png,image/tiff,image/*"
                               capture="environment"
                               aria-label="{% trans 'Meyve Fotoğrafı Seç' %}"
                               onchange="handleFileSelect(event)">
                        <div class="upload-icon"><i class="fa-solid fa-camera-retro"></i></div>
                        <div class="upload-label">{% trans "Fotoğraf seç veya çek" %}</div>
                        <div class="upload-sub">{% trans "JPEG · PNG · TIFF (maks. 10 MB)" %}</div>
                    </div>
                    <div id="preview-container">
                        <img id="output" src="" alt="{% trans 'Önizleme' %}">
                        <div id="preview-filename"></div>
                    </div>
                </div>

                <button id="submitBtn" type="button" class="btn btn-submit-mobile" onclick="handleFormSubmit()">
                    <i class="fa-solid fa-magnifying-glass"></i> {% trans "Tespit Başlat" %}
                </button>
            </form>

            <div id="detection-status-box">
                <div id="detection-status-msg">{% trans "İşleniyor..." %}</div>
                <div id="detection-progress-track">
                    <div id="detection-progress-bar"></div>
                </div>
            </div>

            <div id="detection-result-card">
                <div class="result-header"><i class="fa-solid fa-check-circle"></i> {% trans "Tespit Sonuçları" %}</div>
                <div class="result-body" id="detection-result-body"></div>
                <div id="detection-result-img"><img id="detection-result-image" src="" alt="{% trans 'Tespit Görüntüsü' %}"></div>
            </div>
        </div>
    </div>
</div>

<script>
const MAX_FILE_SIZE = 10 * 1024 * 1024;

function handleFileSelect(event) {
    const file = event.target.files && event.target.files[0];
    if (!file) return;

    if (!file.type.startsWith('image/')) {
        alert('Geçersiz dosya formatı. Lütfen bir görsel seçin.');
        event.target.value = '';
        return;
    }
    if (file.size > MAX_FILE_SIZE) {
        alert('Dosya boyutu çok büyük. Maksimum 10 MB yüklenebilir.');
        event.target.value = '';
        return;
    }

    const zone = document.getElementById('uploadZone');
    zone.style.borderColor = '#2E7D32';
    zone.style.background  = '#E8F5E9';

    const reader = new FileReader();
    reader.onload = function() {
        document.getElementById('output').src = reader.result;
        document.getElementById('preview-filename').textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';
        document.getElementById('preview-container').style.display = 'block';
    };
    reader.onerror = function() {
        alert('Dosya okunurken hata oluştu. Lütfen tekrar deneyin.');
        event.target.value = '';
    };
    reader.readAsDataURL(file);
}

function handleFormSubmit() {
    const meyve = document.getElementById('meyve_grubu').value;
    const agacSayisi = document.getElementById('agac_sayisi').value;
    const agacYasi = document.getElementById('agac_yasi').value;
    const fileInput = document.getElementById('exampleInputFile');

    if (!meyve) { alert('Lütfen meyve grubu seçin.'); return; }
    if (!agacSayisi || parseInt(agacSayisi) < 1) { alert('Lütfen geçerli bir ağaç sayısı girin.'); return; }
    if (!agacYasi || parseInt(agacYasi) < 1) { alert('Lütfen geçerli bir ağaç yaşı girin.'); return; }
    if (!fileInput || !fileInput.files || !fileInput.files[0]) { alert('Lütfen bir görsel seçin.'); return; }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Analiz ediliyor…';

    _resetStatus();
    _showStatus('Görüntü yükleniyor...', 5);

    const formData = new FormData(document.getElementById('upload-file'));
    const csrfToken = document.querySelector('[name=csrfmiddlewaretoken]').value;

    fetch('/detection/async-detection/', {
        method: 'POST',
        headers: { 'X-CSRFToken': csrfToken },
        body: formData,
    })
    .then(function(response) {
        return response.json().then(function(data) {
            return { status: response.status, data: data };
        });
    })
    .then(function(obj) {
        const data = obj.data;

        if (obj.status === 200 && data.status === 'SUCCESS') {
            // Cache hit, show result immediately
            _showStatus('Önbellekten döndürüldü', 100);
            _renderResult(data.result, true);
            _resetBtn();
            return;
        }

        if (obj.status === 202 && data.task_id && data.stream_url) {
            // Start SSE stream
            _showStatus('Görev kuyruğa alındı, işlem başlıyor...', 10);
            _openStream(data.stream_url);
            return;
        }

        _showError(data.error || 'Beklenmeyen sunucu yanıtı.');
        _resetBtn();
    })
    .catch(function(err) {
        _showError('Sunucuya bağlanılamadı: ' + err.message);
        _resetBtn();
    });
}

var _activeSource = null;

function _openStream(streamUrl) {
    if (_activeSource) { _activeSource.close(); }

    var es = new EventSource(streamUrl);
    _activeSource = es;

    es.onmessage = function(event) {
        var payload;
        try { payload = JSON.parse(event.data); } catch(e) { return; }

        if (payload.status === 'done') {
            es.close();
            _activeSource = null;
            return;
        }

        if (payload.status === 'SUCCESS') {
            _showStatus('Tespit tamamlandı', 100);
            _renderResult(payload.result, false);
            _resetBtn();
            return;
        }

        if (payload.status === 'FAILURE') {
            _showError(payload.error || 'İşlem başarısız oldu.');
            _resetBtn();
            return;
        }

        if (payload.status === 'TIMEOUT') {
            _showError('İstek zaman aşımına uğradı. Lütfen tekrar deneyin.');
            _resetBtn();
            return;
        }

        // PENDING / PROCESSING
        _showStatus(payload.message || 'İşleniyor...', payload.progress || 10);
    };

    es.onerror = function() {
        if (es.readyState === EventSource.CLOSED) return;
        es.close();
        _activeSource = null;
        _showError('Bağlantı kesildi. Lütfen tekrar deneyin.');
        _resetBtn();
    };
}

function _showStatus(msg, progress) {
    var box = document.getElementById('detection-status-box');
    box.style.display = 'block';
    box.classList.remove('error');
    document.getElementById('detection-status-msg').textContent = msg;
    document.getElementById('detection-progress-bar').style.width = (progress || 0) + '%';
}

function _showError(msg) {
    var box = document.getElementById('detection-status-box');
    box.style.display = 'block';
    box.classList.add('error');
    document.getElementById('detection-status-msg').textContent = msg;
    document.getElementById('detection-progress-bar').style.width = '0%';
}

function _resetStatus() {
    var box = document.getElementById('detection-status-box');
    box.style.display = 'none';
    box.classList.remove('error');
    document.getElementById('detection-result-card').style.display = 'none';
    document.getElementById('detection-result-img').style.display = 'none';
}

function _resetBtn() {
    var btn = document.getElementById('submitBtn');
    btn.disabled = false;
    btn.innerHTML = '<i class="fa-solid fa-magnifying-glass"></i> Tespit Başlat';
}

function _renderResult(result, fromCache) {
    if (!result) return;

    var rows = [
        { label: 'Tespit Sayısı', value: result.detected_count + ' adet' },
        { label: 'Meyve Ağırlığı (ağaç başı)', value: result.weight ? result.weight.toFixed(2) + ' kg' : '-' },
        { label: 'Toplam Ağırlık', value: result.total_weight ? result.total_weight.toFixed(2) + ' kg' : '-' },
        { label: 'Güven Skoru', value: result.confidence_score ? (result.confidence_score * 100).toFixed(1) + '%' : '-' },
        { label: 'İşlem Süresi', value: fromCache ? 'Önbellekten' : (result.processing_time ? result.processing_time.toFixed(2) + ' sn' : '-') },
    ];

    var html = rows.map(function(r) {
        return '<div class="result-row"><span class="label">' + r.label + '</span><span class="value">' + r.value + '</span></div>';
    }).join('');
    document.getElementById('detection-result-body').innerHTML = html;
    document.getElementById('detection-result-card').style.display = 'block';

    if (result.image_path) {
        var imgEl = document.getElementById('detection-result-image');
        imgEl.src = '/static/' + result.image_path;
        document.getElementById('detection-result-img').style.display = 'block';
    }
}

(function() {
    var zone = document.getElementById('uploadZone');
    if (!zone) return;
    zone.addEventListener('dragover',  function(e) { e.preventDefault(); zone.classList.add('dragover'); });
    zone.addEventListener('dragleave', function()  { zone.classList.remove('dragover'); });
    zone.addEventListener('drop',      function(e) {
        e.preventDefault();
        zone.classList.remove('dragover');
        var input = document.getElementById('exampleInputFile');
        if (e.dataTransfer.files.length && input) {
            var dt = new DataTransfer();
            dt.items.add(e.dataTransfer.files[0]);
            input.files = dt.files;
            input.dispatchEvent(new Event('change'));
        }
    });
})();
</script>
