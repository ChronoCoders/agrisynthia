version: '3.9'

services:
  # PostgreSQL Database
  db:
    image: postgis/postgis:15-3.4
    container_name: agrisynthia_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-agrisynthia}
      POSTGRES_USER: ${DATABASE_USER:-agrisynthia_user}
      # SECURITY: Change this password in production! Do not use defaults.
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD environment variable is required}
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-agrisynthia_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisynthia_network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: agrisynthia_redis
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agrisynthia_network
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    restart: unless-stopped

  # Django Web Application
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrisynthia_web
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn agrisynthia.wsgi:application --config gunicorn_config.py"
    volumes:
      - .:/app
      - static_volume:/app/static
      - media_volume:/app/media
      - logs_volume:/app/logs
      - models_volume:/app/models
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DJANGO_ENVIRONMENT: ${DJANGO_ENVIRONMENT:-production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_DEBUG: ${DJANGO_DEBUG:-False}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DATABASE_NAME: ${DATABASE_NAME:-agrisynthia}
      DATABASE_USER: ${DATABASE_USER:-agrisynthia_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD environment variable is required}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agrisynthia_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Celery Worker
  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrisynthia_celery_worker
    command: celery -A agrisynthia worker -l info
    volumes:
      - .:/app
      - media_volume:/app/media
      - logs_volume:/app/logs
      - models_volume:/app/models
    environment:
      DJANGO_ENVIRONMENT: ${DJANGO_ENVIRONMENT:-production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_NAME: ${DATABASE_NAME:-agrisynthia}
      DATABASE_USER: ${DATABASE_USER:-agrisynthia_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD environment variable is required}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrisynthia_network
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Celery Beat (Scheduler)
  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agrisynthia_celery_beat
    command: celery -A agrisynthia beat -l info --schedule /app/logs/celerybeat-schedule
    volumes:
      - .:/app
      - logs_volume:/app/logs
    environment:
      DJANGO_ENVIRONMENT: ${DJANGO_ENVIRONMENT:-production}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DATABASE_NAME: ${DATABASE_NAME:-agrisynthia}
      DATABASE_USER: ${DATABASE_USER:-agrisynthia_user}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:?DATABASE_PASSWORD environment variable is required}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agrisynthia_network
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Monitoring stack
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: agrisynthia_prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "127.0.0.1:9090:9090"
    networks:
      - agrisynthia_network
    restart: unless-stopped
    depends_on:
      - web
      - redis_exporter
      - postgres_exporter
      - celery_exporter

  grafana:
    image: grafana/grafana:10.4.0
    container_name: agrisynthia_grafana
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD is required}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    networks:
      - agrisynthia_network
    restart: unless-stopped
    depends_on:
      - prometheus

  redis_exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: agrisynthia_redis_exporter
    environment:
      REDIS_ADDR: redis://redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    networks:
      - agrisynthia_network
    restart: unless-stopped
    depends_on:
      - redis

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: agrisynthia_postgres_exporter
    environment:
      DATA_SOURCE_NAME: "postgresql://${DATABASE_USER:-agrisynthia_user}:${DATABASE_PASSWORD}@db:5432/${DATABASE_NAME:-agrisynthia}?sslmode=disable"
    networks:
      - agrisynthia_network
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy

  celery_exporter:
    image: danihodovic/celery-exporter:0.10.4
    container_name: agrisynthia_celery_exporter
    environment:
      CE_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
    networks:
      - agrisynthia_network
    restart: unless-stopped
    depends_on:
      - redis

  # Nginx Reverse Proxy (Optional — activate with: docker compose --profile with-nginx up)
  nginx:
    image: nginx:alpine
    container_name: agrisynthia_nginx
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - static_volume:/app/static:ro
      - media_volume:/app/media:ro
      - ./ssl:/etc/nginx/ssl:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - agrisynthia_network
    restart: unless-stopped
    profiles:
      - with-nginx

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_volume:
    driver: local
  # media_volume: when USE_R2=True, uploaded files go to Cloudflare R2 and this
  # volume is no longer used for media. It is kept here for backward compatibility
  # (local dev without R2). Remove it manually once R2 is the sole storage backend.
  media_volume:
    driver: local
  logs_volume:
    driver: local
  models_volume:
    driver: local
  grafana_data:
    driver: local

networks:
  agrisynthia_network:
    driver: bridge
